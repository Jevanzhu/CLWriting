# Electron 桌面打包配置（#electron）
appId: com.clwriting.studio
productName: CLWriting
directories:
  output: dist-electron
# asar 内容：主进程 + cli + chunks + 前端 + 模板
files:
  - dist/**/*
  - templates/**/*
  - package.json
asar: true
mac:
  category: public.app-category.productivity
  target:
    - dmg
# win/linux 暂缓（2026-06-30 仅 mac 决策）；恢复时取消注释
