# Electron 桌面应用构建（#electron · 仅 mac，2026-06-30 决策）
# 手动触发 或 tag v* 触发；产物 macOS→dmg（win/linux 暂缓）
name: Desktop Build
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]  # 仅 mac（win/linux 暂缓 2026-06-30）
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      # build:desktop = build:all(tsup+web) + electron-builder（unsigned 首版）
      - run: npm run build:desktop
      - uses: actions/upload-artifact@v4
        with:
          name: clwriting-desktop-${{ matrix.os }}
          path: |
            dist-electron/*.dmg
            dist-electron/mac*/
          if-no-files-found: error
