name: CI

on:
  # 暂停 push / pull_request 自动触发，避免频繁 push 时反复跑 CI。
  # 需要验证时在 GitHub Actions 页面手动 Run workflow。
  workflow_dispatch:

jobs:
  build-test:
    name: ${{ matrix.os }} · Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]  # 仅 mac（win/linux 暂缓 2026-06-30）
        node: [24]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: 装依赖
        run: npm ci

      - name: 装前端依赖（web-next node_modules）
        run: npm --prefix src/studio/web-next ci

      - name: 类型检查（tsc --noEmit 零错）
        run: npm run typecheck

      - name: 前端类型检查（vue-tsc）
        run: npm --prefix src/studio/web-next run typecheck

      - name: 构建（src + web-next → dist，发布资产门）
        run: npm run build:all

      - name: Studio 前端资产 smoke（dist/web/index.html 必须存在）
        run: node -e "const fs=require('fs');if(!fs.existsSync('dist/web/index.html')){console.error('dist/web/index.html 缺失,发布包会无前端');process.exit(1)}"

      - name: 测试（含 node:sqlite smoke）
        run: npm test

      - name: RC 中文路径专项（Windows 发布门）
        run: npm run test:rc-path

      - name: bin 链路 smoke（build → bin 可执行）
        run: node dist/cli.js --version

      - name: 运行时零第三方依赖断言
        run: node -e "const d=require('./package.json').dependencies||{}; if(Object.keys(d).length){console.error('运行时依赖非空:',d);process.exit(1)}"

  # e2e job 暂移除（T4.3 切 web-next 后旧 Playwright selector 失效，test:e2e 已 echo 禁用）；
  # web-next e2e 待重写后恢复，见 Dev/Main/Reviews/webnext-平价验收.md「延期事项」。
