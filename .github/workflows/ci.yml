name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test:
    name: ${{ matrix.os }} · Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [24]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: 装依赖
        run: npm ci

      - name: 装前端依赖（web node_modules）
        run: npm --prefix src/studio/web ci

      - name: 类型检查（tsc --noEmit 零错）
        run: npm run typecheck

      - name: 前端类型检查（vue-tsc）
        run: npm --prefix src/studio/web run typecheck

      - name: 构建（src + web → dist，发布资产门）
        run: npm run build:all

      - name: Studio 前端资产 smoke（dist/web/index.html 必须存在）
        run: node -e "const fs=require('fs');if(!fs.existsSync('dist/web/index.html')){console.error('dist/web/index.html 缺失,发布包会无前端');process.exit(1)}"

      - name: 测试（含 node:sqlite smoke）
        run: npm test

      - name: RC 中文路径专项（Windows 发布门）
        run: npm run test:rc-path

      - name: bin 链路 smoke（build → bin 可执行）
        run: node dist/cli.js --version

      - name: 运行时零第三方依赖断言
        run: node -e "const d=require('./package.json').dependencies||{}; if(Object.keys(d).length){console.error('运行时依赖非空:',d);process.exit(1)}"
